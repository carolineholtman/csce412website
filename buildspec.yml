version: 0.2

phases:
  build:
    commands:
      - echo "Syncing files..."
      - aws s3 sync . s3://csce412carolineholtman.me --delete --exclude ".git/*" --exclude "buildspec.yml"
  post_build:
    commands:
      - echo "Invalidating CloudFront cache..."
      - aws cloudfront create-invalidation --distribution-id E1SIB25JOYO4XG --paths "/*"
artifacts:
  files:
    - '**/*'
